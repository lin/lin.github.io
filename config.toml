baseURL = 'https://yingkui.com/'
languageCode = 'en-us'
title = "Yingkui Lin"
theme = "hugo-ink"

copyright = "© Copyright Yingkui.com All Rights Reserved"

[params]
  subtitle = "A Curious Mind."
  avatar = "/logo-ai.jpg"
  customCSS = "css/custom.css"  # Custom CSS applied to default styles.
  mainSections = ['posts']
  math = true

[[menu.main]]
name = "Essays"
url = "/"
weight = 1

[[menu.main]]
name = "About"
url = "/about"
weight = 3

[permalinks]
  posts = '/:contentbasename'
  pages = '/:contentbasename'
  archives = '/:contentbasename'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "static"
  target = "static"

[[module.mounts]]
  source = "layouts"
  target = "layouts"

[[module.mounts]]
  source = "content/img"
  target = "static/img"
