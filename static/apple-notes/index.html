<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #0f1419;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .header {
            padding: 10px 16px;
            font-size: 20px;
            font-weight: 700;
            border: 1px solid #eff3f4;
            border-bottom: none;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        .note {
            border: 1px solid #eff3f4;
            border-top: none;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            transition: background-color 0.2s;
        }
        .note:hover {
            background-color: #f7f9f9;
        }
        .note:last-child {
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #38d3d6;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 10px;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .note-content {
            flex: 1;
            min-width: 0;
        }
        .note-header {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .name {
            font-weight: 700;
            color: #0f1419;
        }
        .date-separator, .date {
            color: #536471;
        }
        .text {
            font-size: 15px;
            line-height: 20px;
            white-space: pre-wrap;
            margin-bottom: 12px;
            word-wrap: break-word;
        }
        .text a {
            color: #1d9bf0;
            text-decoration: none;
        }
        .text a:hover {
            text-decoration: underline;
        }
        .message {
            padding: 20px;
            text-align: center;
            color: #536471;
            border: 1px solid #eff3f4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>Notes</span>
            <img src="imgs/logo.webp" alt="Notes">
        </div>
        <div id="notes-container">
            <div class="message">Loading notes...</div>
        </div>
    </div>

    <script>
        const AVATAR_URL = '../twitter/avatar.jpg';
        const USER_NAME = 'Yingkui Lin';

        function looksLikeDate(text) {
            return /\d{4}-\d{2}-\d{2}/.test(text) || /[A-Za-z]{3}\s+\d{1,2},\s+\d{4}/.test(text);
        }

        async function loadNotes() {
            const urlParams = new URLSearchParams(window.location.search);
            const year = urlParams.get('year') || '2015';
            const filename = `notes_${year}.txt`;

            document.title = `Notes in ${year}`;
            const headerSpan = document.querySelector('.header span');
            if (headerSpan) headerSpan.textContent = `Notes in ${year}`;

            const container = document.getElementById('notes-container');
            container.innerHTML = `<div class="message">Loading notes for ${year}...</div>`;

            try {
                let imageMap = {};
                try {
                    const mapResp = await fetch('imgs/images.json');
                    if (mapResp.ok) {
                        imageMap = await mapResp.json();
                    }
                } catch (e) {
                    imageMap = {};
                }

                const response = await fetch(`${filename}?t=${Date.now()}`);
                if (!response.ok) throw new Error(`Failed to load ${filename}`);

                const text = await response.text();
                container.innerHTML = '';

                const rawNotes = text.split('————').map(n => n.trim()).filter(n => n);

                if (headerSpan) headerSpan.textContent = `${rawNotes.length} Notes in ${year}`;

                rawNotes.forEach(rawNote => {
                    const lines = rawNote.split('\n').map(l => l.trim());
                    if (lines.length === 0) return;

                    let date = '';
                    let id = '';
                    let contentLines = lines;
                    const metaLine = lines[lines.length - 1];

                    if (metaLine.includes('|')) {
                        const parts = metaLine.split('|').map(s => s.trim());
                        date = parts[0] || '';
                        id = parts[1] || '';
                        contentLines = lines.slice(0, -1);
                    } else if (looksLikeDate(metaLine)) {
                        date = metaLine;
                        contentLines = lines.slice(0, -1);
                    }

                    const content = contentLines.join('\n').trim();
                    if (!content && !date) return;

                    const linkedContent = content.replace(
                        /(https?:\/\/[^\s]+)/g,
                        '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
                    );

                    let imgHtml = '';
                    const images = id && imageMap[id] ? imageMap[id] : [];

                    if (images.length > 0) {
                        imgHtml = '<div class="note-images" style="margin-top: 12px;">';
                        images.forEach(imgFile => {
                            imgHtml += `<img src="imgs/${imgFile}" alt="Note Image" loading="lazy" style="width: 100%; border-radius: 12px; border: 1px solid #cfd9de; margin-bottom: 8px; display: block;">`;
                        });
                        imgHtml += '</div>';
                    }

                    const noteEl = document.createElement('div');
                    noteEl.className = 'note';

                    const dateHtml = date ? `<span class="date-separator">·</span><span class="date">${date}</span>` : '';

                    noteEl.innerHTML = `
                        <div class="avatar">
                            ${AVATAR_URL ? `<img src="${AVATAR_URL}" alt="${USER_NAME}">` : 'YL'}
                        </div>
                        <div class="note-content">
                            <div class="note-header">
                                <span class="name">${USER_NAME}</span>
                                ${dateHtml}
                            </div>
                            <div class="text">${linkedContent}</div>
                            ${imgHtml}
                        </div>
                    `;

                    container.appendChild(noteEl);
                });
            } catch (error) {
                container.innerHTML = `<div class="message">Error loading notes for ${year}.<br>Make sure ${filename} exists.</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadNotes);
    </script>
</body>
</html>
